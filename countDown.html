<html>
<head>
<title>count Down Timer</title>
<style>
.csvg-digit {
    display: -moz-inline-stack;
    display: inline-block;
    vertical-align: center;
    *vertical-align: auto;
    zoom: 1;
    *display: inline;
    margin-left: 5px;
}
p {
  text-align: center;
  font-size: 20px;
  margin-top: 0px;
  color: blue;
  padding: 3px;
  background-color:#FFCC66;
}
div {
    text-align: center;
    font-size: 20px;
    margin-top: 0px;
    color: blue;
    padding: 10px;
    background-color: #d25e79;
}
</style>
</head>
<body>
<center>
<table width="200" height="50">
  <tr>
     <td width="50"><div id="days" class="csvg-digit"></div></td>
	   <td width="50"><div id="hour" class="csvg-digit"></div></td>
	   <td width="50"><div id="min" class="csvg-digit"></div></td>
	   <td width="50"> <div id="sec" class="csvg-digit"></div></td>
  </tr>
  <tr><td colspan="4"><div id="">Goverment ShutDown</div></td>
  
  </tr>
 
</table>

</center>


<script>
// Set the date we're counting down to
var countDownDate = new Date("feb 19, 2019 15:51:25").getTime();

// Update the count down every 1 second
var x = setInterval(function() {

  // Get todays date and time
  var now = new Date().getTime();
    
  // Find the distance between now and the count down date
  var distance = countDownDate - now;
    
  // Time calculations for days, hours, minutes and seconds
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);
    
  // Output the result in an element with id="demo"
 document.getElementById("days").innerHTML =  days + "d ";
   document.getElementById("hour").innerHTML =  hours + "h ";
   document.getElementById("min").innerHTML =  minutes + "m ";
   document.getElementById("sec").innerHTML =  seconds + "s ";
    
  // If the count down is over, write some text 
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("demo").innerHTML = "EXPIRED! Blinds UP!!!!";
  }
}, 1000);
</script>

</body>
</html>
