<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All American Network</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="grain gradient-mesh">

  <!-- WELCOME OVERLAY -->
  <div id="welcome-overlay" class="welcome-overlay hidden">
    <div class="welcome-inner">
      <h1 class="welcome-title">Welcome to the All American Network.</h1>
      <p class="welcome-subtitle">Your journey starts now.</p>
    </div>
  </div>

  <!-- AUTH PAGE -->
  <div class="auth-shell" data-view="auth">
    <div class="auth-hero">
      <div class="auth-card shadow-soft">
        <h1 class="auth-title">Sign In</h1>
        <p class="auth-tagline">Join the All American Network</p>

        <div class="auth-actions">
          <button id="btn-sign-up" class="btn btn-primary">Create Account</button>
          <button id="btn-sign-in" class="btn btn-ghost">Sign In</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PROFILE SETUP -->
  <div class="profile-shell" data-view="profile" style="display:none;">
    <div class="auth-hero">
      <div class="auth-card shadow-soft">
        <h1 class="auth-title">Build Your Profile</h1>

        <form id="profile-form" class="auth-form">
          <input id="profile-name" type="text" placeholder="Your Name" required>
          <input id="profile-handle" type="text" placeholder="Handle" required>
          <select id="profile-role" required>
            <option value="">Select Your Lane</option>
            <option value="sports">Sports</option>
            <option value="video">Video</option>
            <option value="dating">Dating</option>
            <option value="truth">Truth</option>
            <option value="business">Business</option>
          </select>
          <textarea id="profile-bio" placeholder="Your bio..." required></textarea>

          <div class="profile-form-row">
            <input id="profile-city" type="text" placeholder="City">
            <input id="profile-state" type="text" placeholder="State">
            <input id="profile-zip" type="text" placeholder="ZIP">
          </div>

          <textarea id="profile-achievements" placeholder="Achievements (optional)"></textarea>

          <button class="btn btn-primary" type="submit">Continue</button>
        </form>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app-shell" data-view="main" style="display:none;">

    <!-- HEADER -->
    <header class="main-nav shadow-soft">
      <div class="header-brand">
        <div class="brand-mark">AAA</div>
        <div>
          <h1 class="brand-title">All American Network</h1>
          <p class="brand-tagline">Your lane. Your story.</p>
        </div>
      </div>

      <nav class="main-nav">
        <button class="nav-link" data-view="general">General</button>
        <button class="nav-link" data-view="sports">Sports</button>
        <button class="nav-link" data-view="about">About</button>
      </nav>

      <div class="header-actions">
        <button id="btn-edit-profile" class="btn-pill">Edit Profile</button>
      </div>
    </header>

    <!-- MAIN GRID -->
    <main class="main-body">

      <!-- SIDEBAR -->
      <aside class="sidebar card shadow-soft">

        <div class="profile-avatar">
          <label for="profile-avatar-input" class="avatar-label">
            <img id="profile-avatar-img" src="default-avatar.png" alt="Profile picture">
            <p class="avatar-change-text">Change Photo</p>
          </label>
          <input id="profile-avatar-input" type="file" accept="image/*" style="display:none;">
        </div>

        <h3 id="friends-title">Your All American Network</h3>
        <p id="friends-subtitle">Your circle across sports, video, dating, business, and life.</p>

        <ul id="friends-list" class="friends-list"></ul>

        <form id="add-friend-form" class="add-friend-form">
          <h4 class="add-friend-title">Add Friend</h4>
          <input id="friend-name" type="text" placeholder="Name">
          <input id="friend-role" type="text" placeholder="Role (optional)">
          <button class="btn btn-primary" type="submit">Add</button>
        </form>

      </aside>

      <!-- FEED COLUMN -->
      <section class="feed-column">

        <!-- ABOUT CONTENT CONTAINER -->
        <div id="about-container" style="display:none;"></div>

        <!-- Composer -->
        <div id="composer-card" class="composer-card card shadow-soft" data-view="general">
          <form id="composer-form" class="composer-form">
            <textarea id="post-caption" placeholder="Share your moment..."></textarea>

            <div class="file-field">
              <label id="file-label" class="file-ui">
                <span class="file-icon">📎</span>
                Upload video, photos, or moments
              </label>
              <input id="post-media" type="file">
            </div>

            <select id="post-rating">
              <option value="">Rate your moment (optional)</option>
              <option value="1">1 Star</option>
              <option value="2">2 Stars</option>
              <option value="3">3 Stars</option>
              <option value="4">4 Stars</option>
              <option value="5">5 Stars</option>
            </select>

            <div id="media-preview" class="media-preview"></div>

            <button class="btn btn-primary" type="submit">Post</button>
          </form>
        </div>

        <!-- Feed -->
        <div id="feed-list" class="feed" data-view="general"></div>

      </section>

      <!-- RIGHT SIDEBAR -->
      <aside class="sidebar card shadow-soft"></aside>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
