<html>
<head>


<title>My Form</title>


<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1"><style type="text/css">
<!--
body {
	background-color: #FF9933;
}
-->
</style></head>

<body>

<h1 align="center">Charles Fletcher's</h1>
<p align="center" class="style9">All America Atlantic News Letter </p>
<table width="600" height="400" border="4" align="center" cellpadding="2" cellspacing="5">
  <tr bgcolor="#FF3300">
    <th colspan="2" class="style7" scope="row">Sign up </th>
   </tr>
  <tr><form name="form" method="post" action="">
    <th width="143" class="style7" scope="row"><div align="left">First Name: </div></th>
    <td width="222"><input type="text" name="first" size="40"></input></td>
  
  <tr>
    <th class="style7" scope="row"><div align="left">Last Name: </div></th>
    <td><input type="text" name="last" size="40"></input></td>
  </tr>
  <tr>
    <th class="style7" scope="row"><div align="left">Email:</div></th>
    <td><input type="text" name="email" size="40"></input></td>
  </tr>
  <tr>
    <th class="style7" scope="row"><div align="left"><strong>Phone#:</strong></div></th>
    <td>
      <input type="text" name="phone" size="40"></input></td>
  </tr>
  <tr>
  <th class="style7"><div align="left"><strong>City:</strong></div></th>
  <td><input type="text" name="city" size="40"></input></td>
  </tr>
  <tr>
  <th class="style8"><div align="left"><strong>State:</strong></div></th>
  <td> <input type="text" name="state" size="40"></input></td>
  </tr>
  <tr bgcolor="#FF3300">
    <th colspan="2" scope="row"><span class="style7"></span>
     <button type="submit" name="Submit" value="">Click to Submit</button>
   </th>
  </tr>
  
  </form>
</table>
<p align="center">&nbsp;</p>
</body>
</html>
