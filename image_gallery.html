
<html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
	font-family: Arial;
	margin: 0;
	background-color: #993300;
}

* {
  box-sizing: border-box;
}

img {
  vertical-align: middle;
}

/* Position the image container (needed to position the left and right arrows) */
.container {
  position: relative;
  background-color:#333333;
}

/* Hide the images by default */
.mySlides {
  display: none;
}

/* Add a pointer when hovering over the thumbnail images */
.cursor {
  cursor: pointer;
}

/* Next & previous buttons */
.prev,
.next {
  cursor: pointer;
  position: absolute;
  top: 40%;
  width: auto;
  padding: 16px;
  margin-top: -50px;
  color: white;
  font-weight: bold;
  font-size: 30px;
  border-radius: 0 3px 3px 0;
  user-select: none;
  -webkit-user-select: none;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

/* On hover, add a black background color with a little bit see-through */
.prev:hover,
.next:hover {
  background-color: rgba(0, 0, 0, 0.8);
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

/* Container for image text */
.caption-container {
  text-align: center;
  background-color: #222;
  padding: 2px 16px;
  color: white;
}

.row:after {
  content: "";
  display: table;
  clear: both;
}

/* Six columns side by side */
.column {
  float: left;
  width: 16.66%;
}

/* Add a transparency effect for thumnbail images */
.demo {
  opacity: 0.6;
}

.active,
.demo:hover {
  opacity: 1;
}
h2 {
background-color:#009900;
padding:10px;
}
</style>
<body>

<h2 align="center"  style="width:100%">Dwights DirtyDip<br> Design  Gallery</h2>
<table width="350" height="207" align="center">
<tr>
<td height="149" bgcolor="#333333">
<div class="container">
  <div class="mySlides">
    <div class="numbertext">1 / 6</div>
    <img src="images/gallery/IMG_0101.JPG" width="250" height="200" style="width:100%">
  </div>

  <div class="mySlides">
    <div class="numbertext">2 / 6</div>
    <img src="images/gallery/IMG_0102.JPG" width="250" height="200" style="width:100%">
  </div>

  <div class="mySlides">
    <div class="numbertext">3 / 6</div>
    <img src="images/gallery/IMG_0103.JPG" width="250" height="200" style="width:100%">
  </div>
    
  <div class="mySlides">
    <div class="numbertext">4 / 6</div>
    <img src="images/gallery/IMG_0104.JPG" width="250" height="200" style="width:100%">
  </div>

  <div class="mySlides">
    <div class="numbertext">5 / 6</div>
    <img src="images/gallery/IMG_0105.JPG" width="250" height="200" style="width:100%">
  </div>
    
  <div class="mySlides">
    <div class="numbertext">6 / 6</div>
    <img src="images/gallery/IMG_0106.JPG" width="250" height="200" style="width:100%">
  </div>
    
  <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
  <a class="next" onclick="plusSlides(1)">&#10095;</a>

  <div class="caption-container">
    <p id="caption"></p>
  </div>

  
</td>
</tr>
<tr>
<td valign="top" bgcolor="#333333">
 <div class="row">
    <div class="column">
      <img src="images/gallery/IMG_0101.JPG" alt="Ft. Lauderdale Boat Show"  width="50" height="50" class="demo cursor" style="width:100%" onclick="currentSlide(1)">
    </div>
    <div class="column">
      <img src="images/gallery/IMG_0102.JPG" alt="Boat Show on the NEW RIVER" width="50" height="50" class="demo cursor" style="width:100%" onclick="currentSlide(2)">
    </div>
    <div class="column">
      <img src="images/gallery/IMG_0103.JPG" alt="Bracass MAR Yatch"  width="50" height="50" class="demo cursor" style="width:100%" onclick="currentSlide(3)">
    </div>
    <div class="column">
      <img src="images/gallery/IMG_0104.JPG" alt="TV Yatch on the new river"  width="50" height="50" class="demo cursor" style="width:100%" onclick="currentSlide(4)">
    </div>
    <div class="column">
      <img src="images/gallery/IMG_0105.JPG" alt="Nature and sunrise"  width="50" height="50" class="demo cursor" style="width:100%" onclick="currentSlide(5)">
    </div>    
    <div class="column">
      <img src="images/gallery/IMG_0106.JPG" alt="Merry Christmas onthe New River"  width="50" height="50" class="demo cursor" style="width:100%" onclick="currentSlide(6)">
    </div>
  </div>
</div>
</td>
</tr>

</table>
<script>
var slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
  showSlides(slideIndex += n);
}

function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {
  var i;
  var slides = document.getElementsByClassName("mySlides");
  var dots = document.getElementsByClassName("demo");
  var captionText = document.getElementById("caption");
  if (n > slides.length) {slideIndex = 1}
  if (n < 1) {slideIndex = slides.length}
  for (i = 0; i < slides.length; i++) {
      slides[i].style.display = "none";
  }
  for (i = 0; i < dots.length; i++) {
      dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex-1].style.display = "block";
  dots[slideIndex-1].className += " active";
  captionText.innerHTML = dots[slideIndex-1].alt;
}
</script>
    
</body>
</html>
